<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #6366f1;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg-card: #f1f5f9;
        --border: rgba(0,0,0,0.08);
        --text: #0f172a;
        --text-muted: #94a3b8;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .version {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
    .cmd-count {
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(99,102,241,0.06));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }
    .cmd-count span {
      color: var(--accent);
      font-weight: 700;
    }
    .shortcut {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .shortcut kbd {
      font-family: var(--font);
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
    }
    .links {
      display: flex;
      gap: 8px;
    }
    .links a {
      flex: 1;
      display: block;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .links a:hover {
      background: rgba(99,102,241,0.15);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Hatch</span>
    <span class="version">v1.0.0</span>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-val" id="s-snippets">-</div><div class="stat-label">Snippets</div></div>
    <div class="stat"><div class="stat-val" id="s-aliases">-</div><div class="stat-label">Aliases</div></div>
    <div class="stat"><div class="stat-val" id="s-notes">-</div><div class="stat-label">Notes</div></div>
    <div class="stat"><div class="stat-val" id="s-commands">-</div><div class="stat-label">Used Commands</div></div>
  </div>

  <div class="cmd-count" id="cmd-count"></div>

  <div class="shortcut">
    Press <kbd>Cmd+Shift+K</kbd> to open palette
  </div>

  <div class="links">
    <a id="settings-link">Settings</a>
    <a id="shortcuts-link">Shortcuts</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
